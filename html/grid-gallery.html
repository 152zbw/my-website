  <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script> <!-- 明确引入 Isotope 库 -->
  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script> <!-- 明确引入 imagesLoaded 库 -->
  <script>
    // 全局Isotope实例
    let myIsotope;

    document.addEventListener('DOMContentLoaded', async function () {
      await renderCategories();
      await renderProjects();

      const projectsContainer = document.getElementById('projectsContainer');
      if (projectsContainer) {
        // 初始化 Isotope 实例，但不立即布局 (initLayout: false)
        myIsotope = new Isotope(projectsContainer, {
          itemSelector: '.isotope-item',
          layoutMode: 'fitRows',
          initLayout: false // 禁用初始布局
        });

        // 等待所有图片加载完成后再执行首次布局和筛选
        imagesLoaded(projectsContainer).on('progress', function() {
          myIsotope.layout(); // 每次图片加载进度更新时重新布局，以适应图片大小
        }).on('always', function() {
          // 所有图片加载完成后，执行最终布局并应用默认筛选
          myIsotope.layout();
          myIsotope.arrange({ filter: '*' });
          document.querySelector('#isotope-filters li:first-child a').classList.add('active');
        });
      }

      // 为分类筛选按钮添加点击事件监听器
      const filtersList = document.getElementById('isotope-filters');
      if (filtersList) {
        filtersList.addEventListener('click', function (event) {
          event.preventDefault(); // 阻止默认的链接跳转行为，防止页面上滑
          const target = event.target.closest('a[data-isotope-filter]');
          if (target && myIsotope) {
            const filterValue = target.getAttribute('data-isotope-filter');
            
            // 移除所有按钮的active类
            filtersList.querySelectorAll('a').forEach(btn => {
              btn.classList.remove('active');
            });
            // 为当前点击的按钮添加active类
            target.classList.add('active');

            // 应用筛选
            if (filterValue === '*') {
              myIsotope.arrange({ filter: '*' });
            } else {
              myIsotope.arrange({ filter: `[data-filter="${filterValue}"]` });
            }
          }
        });
      }
    });

    async function getCategoriesFromApi() {
      try {
        const projects = await window.API.Projects.getAll();
        const categories = new Set();
        projects.forEach(p => {
          if (p.category) {
            categories.add(p.category);
          }
        });
        return Array.from(categories).map(name => ({ name }));
      } catch (error) {
        console.error('从API获取项目分类失败:', error);
        return [];
      }
    }

    async function renderCategories() {
      const categories = await getCategoriesFromApi();
      const filtersList = document.getElementById('isotope-filters');

      const allTypesLi = filtersList.querySelector('li:first-child');
      while (allTypesLi.nextElementSibling) {
          filtersList.removeChild(allTypesLi.nextElementSibling);
      }

      categories.forEach(category => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#'; 
        a.setAttribute('data-isotope-filter', category.name);
        a.setAttribute('data-isotope-group', 'gallery');
        a.textContent = category.name;
        li.appendChild(a);
        filtersList.appendChild(li);
      });
    }

    async function renderProjects() {
      const projectsContainer = document.getElementById('projectsContainer');
      if (!projectsContainer) return;

      projectsContainer.innerHTML = '<div class="col-12 text-center"><p>加载中...</p></div>';

      try {
        const projectsData = await window.API.Projects.getAll();

        if (projectsData && projectsData.length > 0) {
          projectsData.sort((a, b) => a.sortOrder - b.sortOrder);
          projectsContainer.innerHTML = ''; 

          projectsData.forEach((project, index) => {
            const projectCategory = project.category || '未分类';
            const imageUrl = project.image ? (project.image.startsWith('http') || project.image.startsWith('/') ? project.image : `/${project.image}`) : `images/grid-gallery-${(index % 6) + 1}-370x256.jpg`;

            const projectHTML = `
              <div class="col-sm-6 col-lg-4 isotope-item" data-filter="${projectCategory}">
                <a class="thumbnail-modern" href="single-project.html?id=${project.id}" 
                  title="${project.title}">
                  <img class="thumbnail-modern-image" src="${imageUrl}" alt="${project.title}" 
                    width="370" height="256" />
                  <div class="thumbnail-modern-caption">
                    <div class="project-info">
                      <div class="project-title">${project.title}</div>
                      <div class="project-category">${projectCategory}</div>
                    </div>
                  </div>
                  <div class="thumbnail-modern-dummy"></div>
                </a>
              </div>
            `;
            projectsContainer.insertAdjacentHTML('beforeend', projectHTML);
          });

        } else {
          projectsContainer.innerHTML = `
            <div class="col-12 text-center">
              <p>暂无成功案例，请在后台添加</p>
            </div>
          `;
        }
      } catch (error) {
        console.error('加载成功案例失败:', error);
        projectsContainer.innerHTML = `
          <div class="col-12 text-center text-danger">
            <p>加载成功案例失败，请稍后重试。</p>
          </div>
        `;
      }
    }
  </script>
